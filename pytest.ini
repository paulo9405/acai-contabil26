[pytest]
DJANGO_SETTINGS_MODULE = gestao_financeira.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts =
    --reuse-db
    --nomigrations
    --cov=finance
    --cov=gestao_financeira
    --cov=orders
    --cov=stock
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80
    -v
    --tb=short
testpaths = tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
