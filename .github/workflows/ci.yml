name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: acai_test
          POSTGRES_USER: acai_user
          POSTGRES_PASSWORD: acai_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DEBUG: "False"
      SECRET_KEY: "ci-insecure-key-for-testing-only-not-used-in-production"
      DATABASE_URL: "postgres://acai_user:acai_pass@localhost:5432/acai_test"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      SECURE_SSL_REDIRECT: "False"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest
