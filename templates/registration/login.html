{% extends 'base.html' %}

{% block title %}Login - Gestão Financeira{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-wallet2 text-primary" style="font-size: 3rem;"></i>
                        <h2 class="h4 mt-3">Gestão Financeira</h2>
                        <p class="text-muted">Entre com suas credenciais</p>
                    </div>

                    {% if form.errors %}
                    <div class="alert alert-danger">
                        Usuário ou senha inválidos. Tente novamente.
                    </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="{{ form.username.id_for_label }}" class="form-label">
                                Usuário
                            </label>
                            <input type="text" name="username" class="form-control form-control-lg" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="{{ form.password.id_for_label }}" class="form-label">
                                Senha
                            </label>
                            <input type="password" name="password" class="form-control form-control-lg" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-box-arrow-in-right"></i> Entrar
                            </button>
                        </div>

                        <input type="hidden" name="next" value="{{ next }}">
                    </form>
                </div>
            </div>

            <div class="text-center mt-3">
                <small class="text-muted">
                    Gestão Financeira &copy; 2026
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
